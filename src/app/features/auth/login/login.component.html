<div class="min-h-screen bg-surface-50 dark:bg-surface-950 flex items-center justify-center p-4 overflow-hidden relative transition-colors duration-300">
  <!-- Theme Toggle -->
  <div class="absolute top-6 right-6 z-50">
    <button (click)="themeService.toggleTheme()" class="btn-icon">
      @if (themeService.theme() === 'dark') {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
      } @else {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      }
    </button>
  </div>

  <!-- Background glow effects -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary-600/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-indigo-600/15 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-500/5 rounded-full blur-3xl"></div>
  </div>

  <!-- Card -->
  <div class="relative w-full max-w-md animate-slide-up">
    <!-- Logo/Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary-600/10 dark:bg-primary-600/20 border border-primary-500/20 dark:border-primary-500/30 mb-4 glow-primary">
        <svg class="w-7 h-7 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gradient">Enterprise Portal</h1>
      <p class="text-surface-500 dark:text-white/40 text-sm mt-1">Sign in to your account</p>
    </div>

    <div class="glass-card p-8">
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <!-- Email -->
        <div class="mb-5">
          <label class="input-label" for="email">Email address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="input-field"
            [class.border-red-500/50]="emailInvalid"
            placeholder="you@company.com"
            autocomplete="email">
          @if (emailInvalid) {
            <p class="text-red-400 text-xs mt-1.5">Please enter a valid email address.</p>
          }
        </div>

        <!-- Password -->
        <div class="mb-6">
          <div class="flex items-center justify-between mb-1.5">
            <label class="input-label" for="password">Password</label>
            <a href="#" class="text-xs text-primary-400 hover:text-primary-300 transition-colors">Forgot password?</a>
          </div>
          <div class="relative">
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              class="input-field pr-12"
              [class.border-red-500/50]="passwordInvalid"
              placeholder="••••••••"
              autocomplete="current-password">
              <button
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 btn-icon"
                (click)="showPassword.set(!showPassword())">
                @if (showPassword()) {
                  <svg class="w-4 h-4 text-surface-400 dark:text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/></svg>
                } @else {
                  <svg class="w-4 h-4 text-surface-400 dark:text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                }
              </button>
          </div>
          @if (passwordInvalid) {
            <p class="text-red-400 text-xs mt-1.5">Password must be at least 8 characters.</p>
          }
        </div>

        <!-- Submit -->
        <button
          id="login-btn"
          type="submit"
          class="btn-primary w-full flex items-center justify-center gap-2"
          [disabled]="isLoading()">
          @if (isLoading()) {
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Signing in...
          } @else {
            Sign in
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          }
        </button>
      </form>

      <!-- Divider -->
      <div class="relative flex items-center my-6">
        <div class="flex-1 border-t border-surface-200 dark:border-white/10"></div>
        <span class="px-3 text-xs text-surface-400 dark:text-white/30">or</span>
        <div class="flex-1 border-t border-surface-200 dark:border-white/10"></div>
      </div>

      <p class="text-center text-sm text-surface-500 dark:text-white/50">
        Don't have an account?
        <a routerLink="/auth/register" class="text-primary-600 dark:text-primary-400 hover:text-primary-500 dark:hover:text-primary-300 font-medium ml-1 transition-colors">
          Create one
        </a>
      </p>
    </div>

    <!-- Version badge -->
    <p class="text-center text-xs text-surface-400 dark:text-white/20 mt-6">Enterprise API Template v1.0 · Angular 22</p>
  </div>
</div>
