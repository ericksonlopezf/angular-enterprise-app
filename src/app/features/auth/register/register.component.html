<div class="min-h-screen bg-surface-50 dark:bg-surface-950 flex items-center justify-center p-4 overflow-hidden relative transition-colors duration-300">
  <!-- Background glow -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-600/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-indigo-600/15 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md animate-slide-up">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary-600/10 dark:bg-primary-600/20 border border-primary-500/20 dark:border-primary-500/30 mb-4 glow-primary">
        <svg class="w-7 h-7 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gradient">Create Account</h1>
      <p class="text-surface-500 dark:text-white/40 text-sm mt-1">Start your enterprise journey</p>
    </div>

    <div class="glass-card p-8">
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="grid grid-cols-2 gap-4 mb-5">
          <div>
            <label class="input-label" for="firstName">First name</label>
            <input id="firstName" type="text" formControlName="firstName"
              class="input-field" placeholder="John" autocomplete="given-name">
          </div>
          <div>
            <label class="input-label" for="lastName">Last name</label>
            <input id="lastName" type="text" formControlName="lastName"
              class="input-field" placeholder="Doe" autocomplete="family-name">
          </div>
        </div>

        <div class="mb-5">
          <label class="input-label" for="email">Email address</label>
          <input id="email" type="email" formControlName="email"
            class="input-field" placeholder="you@company.com" autocomplete="email">
        </div>

        <div class="mb-6">
          <label class="input-label" for="password">Password</label>
          <input id="password" type="password" formControlName="password"
            class="input-field" placeholder="Minimum 8 characters" autocomplete="new-password">
          @if (form.get('password')?.value?.length) {
            <div class="mt-2 h-1 rounded-full bg-surface-200 dark:bg-white/10 overflow-hidden">
              <div class="h-full rounded-full transition-all duration-500"
                [style.width.%]="passwordStrength().percent"
                [class]="passwordStrength().color">
              </div>
            </div>
            <p class="text-xs mt-1" [class]="passwordStrength().textColor">
              {{ passwordStrength().label }}
            </p>
          }
        </div>

        <button
          id="register-btn"
          type="submit"
          class="btn-primary w-full flex items-center justify-center gap-2"
          [disabled]="isLoading()">
          @if (isLoading()) {
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Creating account...
          } @else {
            Create account
          }
        </button>
      </form>

      <p class="text-center text-sm text-surface-500 dark:text-white/50 mt-6">
        Already have an account?
        <a routerLink="/auth/login" class="text-primary-600 dark:text-primary-400 hover:text-primary-500 dark:hover:text-primary-300 font-medium ml-1 transition-colors">
          Sign in
        </a>
      </p>
    </div>
  </div>
</div>
