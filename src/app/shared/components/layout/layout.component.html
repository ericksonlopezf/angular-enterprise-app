<div class="flex h-screen overflow-hidden bg-surface-50 dark:bg-surface-950 transition-colors duration-300 relative">

  <!-- Background glow effects for Glassmorphism -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary-600/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-indigo-600/15 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-500/5 rounded-full blur-3xl"></div>
  </div>

  <!-- ─── Sidebar ─────────────────────────────────────────────── -->
  <aside class="w-64 shrink-0 flex flex-col border-r border-surface-200/50 dark:border-white/[0.04] bg-surface-100/50 dark:bg-surface-900/50 backdrop-blur-xl transition-colors duration-300 relative z-10">
    <!-- Brand -->
    <div class="h-[72px] px-5 flex items-center border-b border-surface-200/50 dark:border-white/[0.04] shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-primary-600/20 border border-primary-500/30 flex items-center justify-center">
          <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-bold text-surface-900 dark:text-white">Enterprise</p>
          <p class="text-xs text-surface-500 dark:text-white/30">v1.0.0</p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <p class="text-xs text-surface-400 dark:text-white/25 uppercase tracking-widest px-3 py-2 font-medium">Navigation</p>

      <a routerLink="/dashboard" routerLinkActive="nav-link-active" [routerLinkActiveOptions]="{exact: true}"
        class="nav-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>

      <a routerLink="/products" routerLinkActive="nav-link-active"
        class="nav-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
        </svg>
        Products
        @if (productCount() > 0) {
          <span class="ml-auto badge bg-primary-500/20 text-primary-400 border border-primary-500/30">
            {{ productCount() }}
          </span>
        }
      </a>
    </nav>

    <!-- User footer -->
    <div class="p-3 border-t border-surface-200/50 dark:border-white/[0.04]">
      <div class="flex items-center gap-3 p-3 rounded-xl hover:bg-surface-200/50 dark:hover:bg-white/[0.05] transition-colors">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-indigo-600 flex items-center justify-center text-white font-bold text-xs shrink-0">
          {{ auth.displayName().charAt(0).toUpperCase() }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-surface-900 dark:text-white truncate">{{ auth.displayName() }}</p>
          <p class="text-xs text-surface-500 dark:text-white/30 truncate">{{ auth.user()?.email }}</p>
        </div>
        <button class="btn-icon text-surface-400 dark:text-white/30 hover:text-red-500 dark:hover:text-red-400" (click)="logout()" title="Sign out">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ─── Main content ──────────────────────────────────────────── -->
  <main class="flex-1 overflow-y-auto relative z-10 flex flex-col">
    <!-- Top bar -->
    <div class="sticky top-0 z-10 h-[72px] flex items-center justify-between px-6 border-b border-surface-200/50 dark:border-white/[0.04] bg-surface-50/80 dark:bg-surface-950/80 backdrop-blur-xl transition-colors duration-300 shrink-0">
      <div>
        <h2 class="text-sm font-medium text-surface-900 dark:text-white">{{ pageTitle() }}</h2>
      </div>
      <div class="flex items-center gap-4">
        <!-- Theme Toggle -->
        <button (click)="themeService.toggleTheme()" class="btn-icon">
          @if (themeService.theme() === 'dark') {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <!-- Sun icon -->
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
          } @else {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <!-- Moon icon -->
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          }
        </button>
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
          <span class="text-xs text-surface-500 dark:text-white/30">API Connected</span>
        </div>
      </div>
    </div>

    <!-- Routed Components -->
    <div class="flex-1">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
