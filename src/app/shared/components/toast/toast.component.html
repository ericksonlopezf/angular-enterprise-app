<div class="fixed top-4 right-4 z-50 flex flex-col gap-3 w-96 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-start gap-3 p-4 rounded-xl border shadow-xl animate-slide-in-right backdrop-blur-xl"
      [class]="getClasses(toast)">

      <!-- Icon -->
      <div class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center" [class]="getIconBg(toast)">
        @switch (toast.type) {
          @case ('success') { <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> }
          @case ('error')   { <svg class="w-4 h-4 text-red-400"     fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg> }
          @case ('warning') { <svg class="w-4 h-4 text-amber-400"   fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 4h.01M12 3l9 16H3L12 3z"/></svg> }
          @case ('info')    { <svg class="w-4 h-4 text-blue-400"    fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> }
        }
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-white">{{ toast.title }}</p>
        @if (toast.message) {
          <p class="text-xs text-white/60 mt-0.5">{{ toast.message }}</p>
        }
      </div>

      <!-- Dismiss -->
      <button
        class="shrink-0 btn-icon text-white/40 hover:text-white"
        (click)="toastService.dismiss(toast.id)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  }
</div>
